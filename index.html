<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0">
    <title>GOD MODE - CAO MINH DUY V80</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        :root { 
            --bg: #020205; --cyan: #00f2ff; --gold: #ffcc00; --card: rgba(17, 17, 29, 0.95); 
            --red: #ff3131; --vip: #ff00ff; --border: rgba(0, 242, 255, 0.2);
            --neon-blue: 0 0 15px rgba(0, 242, 255, 0.5);
            --neon-red: 0 0 15px rgba(255, 49, 49, 0.5);
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        body { 
            background: var(--bg); background-image: radial-gradient(circle at 50% 50%, #101025 0%, #020205 100%);
            color: #ffffff; margin: 0; padding: 0; min-height: 100vh; overflow-x: hidden;
        }
        .container { max-width: 550px; margin: auto; padding: 20px; animation: fadeIn 0.8s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .box { 
            background: var(--card); border-radius: 24px; border: 1px solid var(--border); 
            padding: 25px; margin-bottom: 20px; backdrop-filter: blur(20px);
            box-shadow: 0 10px 40px rgba(0,0,0,0.7); position: relative; overflow: hidden;
        }
        .box::before {
            content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%;
            background: conic-gradient(transparent, transparent, transparent, var(--cyan));
            animation: rotate 6s linear infinite; z-index: -1; opacity: 0.1;
        }
        @keyframes rotate { 100% { transform: rotate(360deg); } }

        input, textarea { 
            width: 100%; padding: 16px; margin: 10px 0; border-radius: 14px; border: 1px solid #222; 
            background: rgba(0,0,0,0.6); color: #fff; font-size: 15px; outline: none; transition: 0.4s;
        }
        input:focus { border-color: var(--cyan); box-shadow: var(--neon-blue); }

        button { 
            border: none; padding: 16px; border-radius: 14px; font-weight: 900; cursor: pointer; 
            transition: 0.3s; text-transform: uppercase; font-size: 14px; letter-spacing: 1px;
            display: flex; align-items: center; justify-content: center; gap: 8px;
        }
        button:active { transform: scale(0.94); }
        .btn-main { background: linear-gradient(90deg, #00f2ff, #0077ff); color: #000; width: 100%; box-shadow: var(--neon-blue); }
        .btn-gold { background: linear-gradient(90deg, #ffcc00, #ff8800); color: #000; width: 100%; box-shadow: 0 0 15px rgba(255, 204, 0, 0.4); }
        .btn-danger { background: linear-gradient(90deg, #ff3131, #8b0000); color: #fff; box-shadow: var(--neon-red); }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }

        #adm-toggle { 
            position: fixed; width: 65px; height: 65px; background: linear-gradient(135deg, #ff3131, #000); 
            border-radius: 50%; border: 3px solid #fff; z-index: 1000; display: none; align-items: center; 
            justify-content: center; box-shadow: var(--neon-red); touch-action: none; cursor: move;
        }
        #adm-modal { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.92); backdrop-filter: blur(15px); 
            z-index: 1001; display: none; overflow-y: auto; padding: 30px; animation: zoom 0.3s;
        }
        @keyframes zoom { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }

        .qr-area { 
            display: none; background: #fff; padding: 25px; border-radius: 25px; 
            border: 5px solid var(--cyan); margin-top: 20px; color: #000; text-align: center;
        }
        .qr-area img { width: 250px; border-radius: 15px; margin-bottom: 10px; }

        table { width: 100%; border-collapse: separate; border-spacing: 0 8px; }
        th { text-transform: uppercase; font-size: 11px; color: #666; padding: 10px; letter-spacing: 1px; }
        td { background: rgba(255,255,255,0.03); padding: 15px 10px; border-radius: 0; font-size: 13px; }
        td:first-child { border-radius: 12px 0 0 12px; }
        td:last-child { border-radius: 0 12px 12px 0; }

        .gear-btn { font-size: 18px; cursor: pointer; transition: 0.3s; display: inline-block; }
        .gear-btn:hover { transform: rotate(90deg); color: var(--cyan); }
        .opt-box { 
            display: none; background: #000; border: 1px solid #333; padding: 15px; 
            border-radius: 16px; margin-top: 10px; animation: slideIn 0.3s forwards;
        }
        @keyframes slideIn { from { opacity: 0; filter: blur(10px); } to { opacity: 1; filter: blur(0); } }
        .opt-box a { 
            display: block; color: var(--cyan); text-decoration: none; padding: 12px; 
            border-bottom: 1px solid #111; font-weight: 600; font-size: 13px;
        }

        .maint-overlay { 
            position: fixed; inset: 0; background: #000; z-index: 9999; 
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
    </style>
</head>
<body>

    <div id="maint-msg" class="maint-overlay">
        <h1 style="color:var(--red); text-shadow: var(--neon-red);">SHOP UNDER MAINTENANCE</h1>
        <p style="color:#555">Sếp vui lòng quay lại sau ít phút!</p>
    </div>

    <div id="auth-ui" class="container" style="margin-top: 10vh;">
        <div class="box">
            <h1 style="text-align:center; letter-spacing:8px; background: linear-gradient(to right, #00f2ff, #fff); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">V80 GOD</h1>
            <input type="text" id="au" placeholder="Username">
            <input type="password" id="ap" placeholder="Password">
            <div class="grid">
                <button class="btn-main" onclick="auth('login')">LOGIN SYSTEM</button>
                <button style="background:rgba(255,255,255,0.05); color:#fff" onclick="auth('reg')">CREATE</button>
            </div>
        </div>
    </div>

    <div id="adm-toggle" onmousedown="dragStart(event)" ontouchstart="dragStart(event)">
        <img src="https://cdn-icons-png.flaticon.com/512/9334/9334486.png" width="35" style="filter: invert(1);">
    </div>

    <div id="adm-modal">
        <div style="display:flex; justify-content: space-between; margin-bottom:30px">
            <h2 style="color:var(--red); text-shadow: var(--neon-red);">ADMINISTRATION</h2>
            <button onclick="document.getElementById('adm-modal').style.display='none'" class="btn-danger" style="padding:10px 25px">EXIT</button>
        </div>
        <div class="box">
            <button id="btn-shop-status" onclick="toggleShop()" style="margin-bottom:20px"></button>
            <div class="grid-4">
                <div><label>NGÀY</label><input type="number" id="adm-p-ngay"></div>
                <div><label>TUẦN</label><input type="number" id="adm-p-tuan"></div>
                <div><label>THÁNG</label><input type="number" id="adm-p-thang"></div>
                <div><label>NĂM</label><input type="number" id="adm-p-nam"></div>
            </div>
            <button class="btn-main" onclick="saveSettings()">SAVE SYSTEM PARAMETERS</button>
        </div>
        <div class="box">
            <h4>KEY INVENTORY (AUTO-SPLIT BY NEW LINE)</h4>
            <textarea id="add-k" placeholder="Paste keys here..." style="height:120px"></textarea>
            <div class="grid-4">
                <button class="btn-main" onclick="upK('ngay')">+N</button>
                <button class="btn-main" onclick="upK('tuan')">+T</button>
                <button class="btn-main" onclick="upK('thang')">+Th</button>
                <button class="btn-main" onclick="upK('nam')">+Nam</button>
            </div>
        </div>
        <div class="box">
            <h4>DEPOSIT QUEUE</h4>
            <div id="adm-pay-list"></div>
        </div>
        <div class="box">
            <h4>USER MANAGEMENT</h4>
            <div style="overflow-x:auto"><table id="adm-user-list"></table></div>
        </div>
    </div>

    <div id="shop-ui" class="container" style="display:none;">
        <div class="box" style="border-top: 4px solid var(--cyan);">
            <div style="display:flex; justify-content: space-between;">
                <div><small style="color:#666">WELCOME</small><br><b id="u-id" style="color:var(--cyan); font-size:22px"></b></div>
                <div style="text-align:right"><small style="color:#666">BALANCE</small><br><b id="u-bl" style="color:var(--gold); font-size:22px">0</b><span style="color:var(--gold)">₫</span></div>
            </div>
            <input type="number" id="n-amt" placeholder="Enter amount to top up...">
            <button class="btn-gold" onclick="nap()">GENERATE PAYMENT QR</button>
            <div id="qr-display" class="qr-area">
                <img id="qr-img" src="">
                <h3 style="margin:10px 0">MB BANK: 0588807300000</h3>
                <p>Nội dung: <b id="txt-nd" style="color:#ff3131; font-size:20px"></b></p>
                <button class="btn-main" onclick="confirmNap()" style="margin-top:20px">CONFIRM TRANSFER</button>
            </div>
        </div>

        <div class="box">
            <h3 style="text-align:center; color:var(--cyan); margin-bottom:20px; letter-spacing:2px">KEY STORE</h3>
            <div class="grid">
                <button class="btn-main" onclick="buy('ngay')">1 DAY (<span id="s-ngay">0</span>)<br><span id="pr-ngay" style="font-size:11px; opacity:0.7"></span></button>
                <button class="btn-main" onclick="buy('tuan')">1 WEEK (<span id="s-tuan">0</span>)<br><span id="pr-tuan" style="font-size:11px; opacity:0.7"></span></button>
                <button class="btn-main" onclick="buy('thang')">1 MONTH (<span id="s-thang">0</span>)<br><span id="pr-thang" style="font-size:11px; opacity:0.7"></span></button>
                <button class="btn-main" onclick="buy('nam')">1 YEAR (<span id="s-nam">0</span>)<br><span id="pr-nam" style="font-size:11px; opacity:0.7"></span></button>
            </div>
        </div>

        <div class="box">
            <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom:15px">
                <h4 style="margin:0; letter-spacing:1px">PURCHASE HISTORY</h4>
                <button class="btn-danger" onclick="clearHistory()" style="padding:5px 15px; font-size:10px">PURGE CACHE</button>
            </div>
            <table><tbody id="h-list"></tbody></table>
        </div>
    </div>

<script>
    const firebaseConfig = { databaseURL: "https://shopmduy-default-rtdb.asia-southeast1.firebasedatabase.app" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let curU, curUID, settings = {}, shopOpen = true;

    function auth(type) {
        const u = document.getElementById('au').value.trim().toLowerCase(), p = document.getElementById('ap').value;
        if(!u || !p) return;
        if(type === 'reg') {
            db.ref('users/'+u).set({password:p, balance:0, role:'user', uid:"U"+Date.now()}).then(()=>alert("Success!"));
        } else {
            db.ref('users/'+u).once('value', s => {
                const d = s.val();
                if(d && d.password === p) {
                    curU = u; curUID = d.uid;
                    db.ref('system/open').on('value', st => {
                        shopOpen = st.val();
                        if(!shopOpen && d.role !== 'admin') {
                            document.getElementById('maint-msg').style.display = 'flex';
                            document.getElementById('auth-ui').style.display = 'none';
                        } else {
                            document.getElementById('auth-ui').style.display = 'none';
                            document.getElementById('shop-ui').style.display = 'block';
                            document.getElementById('u-id').innerText = u.toUpperCase();
                            if(d.role === 'admin') { document.getElementById('adm-toggle').style.display = 'flex'; initAdmin(); }
                            db.ref('users/'+u+'/balance').on('value', b => document.getElementById('u-bl').innerText = (b.val()||0).toLocaleString());
                            initShop();
                        }
                    });
                } else alert("Error!");
            });
        }
    }

    function initShop() {
        db.ref('system/settings').on('value', s => { 
            settings = s.val() || {}; 
            ['ngay','tuan','thang','nam'].forEach(t => document.getElementById('pr-'+t).innerText = (settings['p_'+t]||0).toLocaleString() + "₫");
        });
        ['ngay','tuan','thang','nam'].forEach(t => db.ref('key_store/'+t).on('value', s => document.getElementById('s-'+t).innerText = s.numChildren()));
        db.ref('history_pay/'+curUID).on('value', h => {
            const t = document.getElementById('h-list'); t.innerHTML = "";
            h.forEach(c => { 
                const i = c.val(); 
                t.innerHTML = `<tr><td>${i.time}</td><td><b style="color:var(--cyan)">${i.status}</b> <span class="gear-btn" onclick="toggleOpts('${c.key}')">⚙️</span>
                <div id="opt-${c.key}" class="opt-box">
                    <a href="https://www.getuid.gt.tc/info?aimdragnoantenna">⚡ DRAG NO-ANTENNA</a>
                    <a href="https://www.getuid.gt.tc/info?aimdragantenna">📡 DRAG ANTENNA</a>
                    <a href="https://www.getuid.gt.tc/info?aimbody">🎯 AIMBODY NO-ANTEN</a>
                </div></td></tr>` + t.innerHTML; 
            });
        });
    }

    function toggleOpts(id) {
        const el = document.getElementById('opt-'+id);
        el.style.display = el.style.display === 'block' ? 'none' : 'block';
    }

    function buy(t) {
        const p = settings['p_'+t];
        db.ref('users/'+curU+'/balance').once('value', s => {
            let b = s.val() || 0; if(b < p) return alert("Hết tiền sếp ơi!");
            db.ref('key_store/'+t).limitToFirst(1).once('value', snap => {
                if(!snap.exists()) return alert("Hết hàng!");
                db.ref('users/'+curU+'/balance').set(b - p);
                let kID = Object.keys(snap.val())[0], kV = snap.val()[kID];
                db.ref('key_store/'+t+'/'+kID).remove();
                db.ref('history_pay/'+curUID).push({time:new Date().toLocaleTimeString(), status:kV});
            });
        });
    }

    function clearHistory() { if(confirm("Dọn dẹp bộ nhớ?")) document.getElementById('h-list').innerHTML = ""; }

    function initAdmin() {
        document.getElementById('adm-toggle').onclick = () => document.getElementById('adm-modal').style.display = 'block';
        db.ref('system/open').on('value', s => {
            const btn = document.getElementById('btn-shop-status');
            btn.innerText = s.val() ? "HỆ THỐNG: ĐANG MỞ" : "HỆ THỐNG: ĐANG ĐÓNG";
            btn.style.background = s.val() ? "linear-gradient(90deg, #00ff00, #004400)" : "linear-gradient(90deg, #ff0000, #440000)";
            btn.style.color = "#fff";
        });
        db.ref('bank_requests').on('value', s => {
            const l = document.getElementById('adm-pay-list'); l.innerHTML = "";
            s.forEach(c => { const r = c.val(); l.innerHTML += `<div class="box" style="padding:15px; margin-bottom:10px">${r.user}: ${r.amount}đ <button onclick="db.ref('users/${r.user}/balance').transaction(v=>(v||0)+${r.amount}); db.ref('bank_requests/${c.key}').remove()" style="padding:8px 20px; background:var(--cyan)">APPROVE</button></div>`; });
        });
        db.ref('users').on('value', s => {
            const l = document.getElementById('adm-user-list'); l.innerHTML = "<tr><th>USER</th><th>BALANCE</th><th>ACTION</th></tr>";
            s.forEach(c => { l.innerHTML += `<tr><td>${c.key}</td><td>${(c.val().balance||0).toLocaleString()}</td><td><button onclick="db.ref('users/${c.key}').remove()" class="btn-danger" style="padding:5px">DELETE</button></td></tr>`; });
        });
    }

    function toggleShop() { db.ref('system/open').set(!shopOpen); }
    function saveSettings() {
        const d = {
            p_ngay: Number(document.getElementById('adm-p-ngay').value),
            p_tuan: Number(document.getElementById('adm-p-tuan').value),
            p_thang: Number(document.getElementById('adm-p-thang').value),
            p_nam: Number(document.getElementById('adm-p-nam').value)
        };
        db.ref('system/settings').update(d).then(() => alert("System updated!"));
    }
    function upK(t) {
        const nK = document.getElementById('add-k').value.trim().split('\n').filter(k=>k.trim()!=="");
        nK.forEach(k => db.ref('key_store/'+t).push(k.trim()));
        alert("Added " + nK.length + " keys!"); document.getElementById('add-k').value="";
    }
    function nap() {
        const amt = Number(document.getElementById('n-amt').value); if(amt < 1000) return alert("Min 1k!");
        const nd = `NAP ${curU.toUpperCase()}`;
        document.getElementById('qr-img').src = `https://img.vietqr.io/image/mbbank-0588807300000-compact2.png?amount=${amt}&addInfo=${nd}`;
        document.getElementById('txt-nd').innerText = nd;
        document.getElementById('qr-display').style.display = 'block';
        db.ref('bank_requests').push({user:curU, amount:amt});
    }
    function confirmNap() { alert("Requested! Please wait."); document.getElementById('qr-display').style.display='none'; }

    let offset = [0,0], isDown = false, el = document.getElementById('adm-toggle');
    function dragStart(e) { isDown = true; let x = e.clientX || e.touches[0].clientX; let y = e.clientY || e.touches[0].clientY; offset = [el.offsetLeft - x, el.offsetTop - y]; }
    document.addEventListener('mousemove', dragMove); document.addEventListener('touchmove', dragMove, {passive: false});
    function dragMove(e) { if (!isDown) return; let x = e.clientX || e.touches[0].clientX; let y = e.clientY || e.touches[0].clientY; el.style.left = (x + offset[0]) + 'px'; el.style.top  = (y + offset[1]) + 'px'; }
    document.addEventListener('mouseup', () => isDown = false); document.addEventListener('touchend', () => isDown = false);
</script>
</body>
</html>
